name: Deploy HTML App with Docker

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Docker Login
      run: echo ${{ secrets.DOCKER_PASS }} | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USER }}/html-app:latest .

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USER }}/html-app:latest

    - name: Stop Old Container
      run: docker rm -f htmlapp || true

    - name: Run New Container
      run: docker run -d -p 3000:80 --name htmlapp ${{ secrets.DOCKER_USER }}/html-app:latest
